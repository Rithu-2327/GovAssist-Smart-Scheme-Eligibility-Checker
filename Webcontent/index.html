<!DOCTYPE html>
<html>
<head>
    <title>Scheme Eligibility Checker</title>
</head>
<body>

<h2>Government Scheme Eligibility Checker</h2>

<form action="result" method="post">

    Age: <input type="number" name="age" required><br><br>

    Income: <input type="number" name="income" required><br><br>

    Category:
    <select name="category">
        <option>General</option>
        <option>SC</option>
        <option>ST</option>
    </select><br><br>

    Gender:
    <select name="gender">
        <option>Male</option>
        <option>Female</option>
    </select><br><br>

    Occupation:
    <input type="text" name="occupation" required><br><br>

    <button type="submit">Check Eligibility</button>

</form>

</body>
</html>
